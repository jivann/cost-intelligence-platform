version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cost_db
    environment:
      POSTGRES_USER: costadmin
      POSTGRES_PASSWORD: costpass123
      POSTGRES_DB: costdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U costadmin -d costdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cost_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: cost_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://costadmin:costpass123@db:5432/costdb
      SECRET_KEY: supersecretkey123
      DEBUG: "True"
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend

volumes:
  postgres_data:
