apiVersion: v1
kind: Pod
metadata:
  name: restore-test
  namespace: data
spec:
  serviceAccountName: data-sa
  restartPolicy: Never
  containers:
  - name: restore-test
    image: postgres:15-alpine
    command: ["sleep", "3600"]
    envFrom:
    - secretRef:
        name: cost-platform-secrets
    volumeMounts:
    - name: backup-storage
      mountPath: /backups
  volumes:
  - name: backup-storage
    persistentVolumeClaim:
      claimName: postgres-backup-pvc
