apiVersion: batch/v1
kind: Job
metadata:
  name: run-migrations
spec:
  template:
    spec:
      containers:
      - name: migrate
        image: cost-api:day19
        command: ["alembic", "upgrade", "head"]
        envFrom:
        - configMapRef:
            name: cost-platform-config
        - secretRef:
            name: cost-platform-secrets
      restartPolicy: Never
  backoffLimit: 2
