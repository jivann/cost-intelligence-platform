apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsUser: 100
        fsGroup: 1000
      containers:
      - name: backend
        image: cost-backend:day22
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        envFrom:
        - configMapRef:
            name: cost-platform-config
        - secretRef:
            name: cost-platform-secrets
        ports:
        - containerPort: 8000
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30800
