apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cost-platform-ingress
  namespace: frontend
  annotations:
    cert-manager.io/cluster-issuer: selfsigned-issuer
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - costplatform.local
      secretName: cost-platform-tls
  rules:
    - host: costplatform.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
