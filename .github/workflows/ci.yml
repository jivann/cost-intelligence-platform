name: CI - Build, Scan, Push

on:
  push:
    branches: [main]

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/cost-backend:${{ github.sha }} .

      - name: Build frontend image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/cost-frontend:${{ github.sha }} ./frontend

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan backend image (fail on CRITICAL)
        run: trivy image --severity CRITICAL --exit-code 1 ghcr.io/${{ github.repository_owner }}/cost-backend:${{ github.sha }}

      - name: Scan frontend image (fail on CRITICAL)
        run: trivy image --severity CRITICAL --exit-code 1 ghcr.io/${{ github.repository_owner }}/cost-frontend:${{ github.sha }}

      - name: Push backend image
        run: docker push ghcr.io/${{ github.repository_owner }}/cost-backend:${{ github.sha }}

      - name: Push frontend image
        run: docker push ghcr.io/${{ github.repository_owner }}/cost-frontend:${{ github.sha }}
