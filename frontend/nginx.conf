server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://cost-intelligence-platform.onrender.com" always;

    location / {
        try_files $uri $uri/ /index.html;
    }
    location /api/ {
        proxy_pass https://cost-intelligence-platform.onrender.com/api/;
        proxy_set_header Host cost-intelligence-platform.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }
}
